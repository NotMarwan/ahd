<!doctype html>

<html dir="rtl" lang="ar"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;500;700&display=swap');
:root{--navy:#002134;--navy-deep:#02141E;--deep:var(--navy-deep);--peach:#E2AD8B;
--ar:"IBM Plex Sans Arabic","Segoe UI","Noto Naskh Arabic",Tahoma,sans-serif}
*{box-sizing:border-box;margin:0}body{background:#0a1620;display:grid;place-items:center;min-height:100vh;padding:16px}
.slide{width:1280px;max-width:100%;aspect-ratio:16/9;color:#fff;font-family:var(--ar);
background:linear-gradient(185deg,var(--deep) 30%,var(--navy));overflow:hidden;
display:grid;place-items:center;text-align:center}
.wordmark{font-size:120px;font-weight:700;letter-spacing:2px}
.soul{font-size:26px;color:var(--peach);margin-top:20px;font-weight:500}
</style></head>
<body><section class="slide">
  <div>
    <h1 class="wordmark">عَهد</h1>
    <div class="soul">«كلمتهم محفوظة، وعلاقتهم محميّة.»</div>
  </div>
</section></body></html>
