<!doctype html>
<!-- critique: P4 H4 E4 S4 R5 V4 -->
<html dir="rtl" lang="ar"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;500;700&display=swap');
:root{--navy:#002134;--navy-deep:#02141E;--deep:var(--navy-deep);--peach:#E2AD8B;--blush:#F3E4DE;--r:24px;
--ar:"IBM Plex Sans Arabic","Segoe UI","Noto Naskh Arabic",Tahoma,sans-serif}
*{box-sizing:border-box;margin:0}body{background:#0a1620;display:grid;place-items:center;min-height:100vh;padding:16px}
.slide{width:1280px;max-width:100%;aspect-ratio:16/9;color:#fff;font-family:var(--ar);
background:linear-gradient(185deg,var(--navy) 55%,var(--deep));overflow:hidden;padding:56px 68px;display:grid;grid-template-rows:auto 1fr auto}
.mast{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(226,173,139,.25);padding-bottom:16px}
.mast .lg{font-size:22px;font-weight:700;color:var(--peach)} .mast .no{font-size:12.5px;color:rgba(243,228,222,.55)}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;align-content:center}
.member{background:rgba(243,228,222,.06);border:1px solid rgba(226,173,139,.22);border-radius:var(--r);
padding:34px 22px;text-align:center}
.avatar{width:92px;height:92px;border-radius:50%;margin:0 auto 18px;border:1px solid rgba(226,173,139,.4);
display:grid;place-items:center;font-size:30px;color:var(--peach);background:rgba(226,173,139,.08)}
.member b{font-size:19px;display:block}
.member span{font-size:13px;color:rgba(243,228,222,.55);display:block;margin-top:6px}
.oath{text-align:center;font-size:17px;color:var(--peach);padding-top:20px;font-weight:500}
</style></head>
<body><section class="slide">
  <header class="mast"><span class="lg">الفريق</span><span class="no">عَهد · ٢ / ١٤</span></header>
  <main class="grid">
    <div class="member"><div class="avatar">{ }</div><b>{TEAM-1}</b><span>يُحَلّ عند البناء — B2</span></div>
    <div class="member"><div class="avatar">{ }</div><b>{TEAM-2}</b><span>يُحَلّ عند البناء — B2</span></div>
    <div class="member"><div class="avatar">{ }</div><b>{TEAM-3}</b><span>يُحَلّ عند البناء — B2</span></div>
    <div class="member"><div class="avatar">{ }</div><b>{TEAM-4}</b><span>يُحَلّ عند البناء — B2</span></div>
  </main>
  <footer class="oath">«بنَينا عهد بأنفسنا: كلّ سطرٍ لنا، وكلّ ادّعاءٍ مُثبَتٌ باختبارٍ آليّ.»</footer>
</section></body></html>
