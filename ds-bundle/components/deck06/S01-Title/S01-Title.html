<!-- @dsCard group="Deck06" name="01 العنوان" -->
<!doctype html>
<!-- critique: P5 H5 E5 S5 R5 V4 -->
<html dir="rtl" lang="ar"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;500;700&display=swap');
:root{--navy:#002134;--deep:#02141E;--peach:#E2AD8B;--blush:#F3E4DE;--r:24px;
--ar:"IBM Plex Sans Arabic","Segoe UI","Noto Naskh Arabic",Tahoma,sans-serif;--mono:"Consolas",monospace}
*{box-sizing:border-box;margin:0}body{background:#0a1620;display:grid;place-items:center;min-height:100vh;padding:16px}
.slide{width:1280px;max-width:100%;aspect-ratio:16/9;color:#fff;font-family:var(--ar);
background:linear-gradient(185deg,var(--navy) 55%,var(--deep));overflow:hidden;
display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:60px}
.kicker{font-size:15px;color:rgba(243,228,222,.6);letter-spacing:.1em;margin-bottom:34px}
.wordmark{font-size:150px;line-height:1;font-weight:700;letter-spacing:2px}
.soul{font-size:29px;color:var(--peach);margin-top:22px;font-weight:500}
.witness{font-size:18px;color:rgba(243,228,222,.65);margin-top:16px;font-weight:300;line-height:1.9}
.team{position:absolute;bottom:44px;inset-inline:68px;display:flex;justify-content:space-between;
border-top:1px solid rgba(226,173,139,.22);padding-top:16px;font-size:13.5px;color:rgba(243,228,222,.55)}
.slide{position:relative}
</style></head>
<body><section class="slide">
  <div class="kicker">هاكاثون أمد ٢٠٢٦ · مصرف الإنماء × أكاديميّة طويق</div>
  <h1 class="wordmark">عَهد</h1>
  <div class="soul">«كلمتك محفوظة، وعلاقتك محميّة»</div>
  <div class="witness">مصرفٌ يَشهد على القرض الحسن — ولا يُقرض، ولا يحكم، ولا يأخذ فائدة.</div>
  <div class="team"><span>فريق: {TEAM}</span><span>١ / ١٤</span></div>
</section></body></html>
