<!-- @dsCard group="Deck06" name="03 المحتويات" -->
<!doctype html>
<!-- critique: P4 H5 E4 S4 R5 V4 -->
<html dir="rtl" lang="ar"><head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;500;700&display=swap');
:root{--navy:#002134;--deep:#02141E;--peach:#E2AD8B;--blush:#F3E4DE;--r:24px;
--ar:"IBM Plex Sans Arabic","Segoe UI","Noto Naskh Arabic",Tahoma,sans-serif}
*{box-sizing:border-box;margin:0}body{background:#0a1620;display:grid;place-items:center;min-height:100vh;padding:16px}
.slide{width:1280px;max-width:100%;aspect-ratio:16/9;color:#fff;font-family:var(--ar);
background:linear-gradient(185deg,var(--navy) 55%,var(--deep));overflow:hidden;padding:56px 68px;display:grid;grid-template-rows:auto 1fr}
.mast{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(226,173,139,.25);padding-bottom:16px}
.mast .lg{font-size:22px;font-weight:700;color:var(--peach)} .mast .no{font-size:12.5px;color:rgba(243,228,222,.55)}
.list{display:grid;grid-template-columns:1fr 1fr;gap:14px 40px;align-content:center}
.item{display:flex;align-items:center;gap:20px;border-bottom:1px solid rgba(243,228,222,.1);padding-bottom:14px}
.n{font-size:34px;font-weight:700;color:var(--peach);min-width:52px}
.item span{font-size:21px;font-weight:300}
</style></head>
<body><section class="slide">
  <header class="mast"><span class="lg">المحتويات</span><span class="no">عَهد · ٣ / ١٤</span></header>
  <main class="list">
    <div class="item"><span class="n">١</span><span>المشكلة والحلّ</span></div>
    <div class="item"><span class="n">٢</span><span>الدليل والبيانات</span></div>
    <div class="item"><span class="n">٣</span><span>التقنيات</span></div>
    <div class="item"><span class="n">٤</span><span>فكرة المنتج</span></div>
    <div class="item"><span class="n">٥</span><span>البيانات: كيف جُمعت وكيف تُستخدم</span></div>
    <div class="item"><span class="n">٦</span><span>التوافق مع محاور المسابقة</span></div>
    <div class="item"><span class="n">٧</span><span>الاختبار والعرض الحيّ وخطّة المستقبل</span></div>
  </main>
</section></body></html>
