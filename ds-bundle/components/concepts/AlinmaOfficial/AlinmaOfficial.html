<!-- @dsCard group="Concepts" name="06 AlinmaOfficial — سويسريّ على أرض الإنماء" -->
<!doctype html>
<!-- critique: P5 H5 E5 S5 R5 V4 · palette scraped from alinma.com portal+amad.css 2026-07-09 -->
<html dir="rtl" lang="ar">
<head><meta charset="utf-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;500;700&display=swap');
:root{ /* locked tokens — every value scraped, source in guidelines/dna-alinma-tuwaiq.md */
  --navy:#002134; --navy-deep:#02141E; --peach:#E2AD8B; --terra:#CD907E; --blush:#F3E4DE;
  --bronze:#803C1C; --ice:#edf2f5; --white:#fff;
  --r-amad:24px; --ar:"IBM Plex Sans Arabic","Segoe UI","Noto Naskh Arabic",Tahoma,sans-serif;
  --mono:"Consolas",monospace }
*{box-sizing:border-box;margin:0} body{background:#0a1620;display:grid;place-items:center;min-height:100vh;padding:16px}
.slide{width:1280px;max-width:100%;aspect-ratio:16/9;color:var(--white);font-family:var(--ar);
  background:linear-gradient(185deg,var(--navy) 55%,var(--navy-deep));
  position:relative;overflow:hidden;padding:60px 72px;display:grid;grid-template-rows:auto 1fr auto}
.masthead{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(226,173,139,.25);padding-bottom:20px}
.masthead .lg{font-size:27px;font-weight:700;color:var(--peach)}
.masthead .ev{font-size:13.5px;color:rgba(243,228,222,.6);letter-spacing:.06em}
.stage{display:grid;align-content:center;gap:4px}
.line{font-size:98px;line-height:1.14;font-weight:700;letter-spacing:-1px}
.line.warm{color:var(--peach)}
.line.dim{color:rgba(243,228,222,.55);font-weight:300;font-size:88px}
.footer{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.chip{background:rgba(243,228,222,.06);border:1px solid rgba(226,173,139,.22);border-radius:var(--r-amad);
  padding:18px 22px;font-size:13px;color:rgba(243,228,222,.75);line-height:1.8}
.chip b{display:block;color:var(--white);font-size:21px;font-weight:700}
.chip code{font-family:var(--mono);direction:ltr;color:var(--peach)}
</style></head>
<body><section class="slide">
  <header class="masthead"><span class="lg">عَهد</span><span class="ev">هاكاثون أمد ٢٠٢٦ · مصرف الإنماء × أكاديميّة طويق</span></header>
  <main class="stage">
    <div class="line">البنكُ يَشهد.</div>
    <div class="line warm">لا يُقرض.</div>
    <div class="line dim">ولا يملكُ أن يُغيّر حرفًا.</div>
  </main>
  <footer class="footer">
    <div class="chip"><b>٩ ← ٢</b>مقاصّةٌ ببرهان حفظٍ — المراكز محفوظةٌ بالهللة</div>
    <div class="chip"><b>35.8٪</b>من السعوديّين يقترضون من أهلهم — Findex 2021</div>
    <div class="chip"><b><code>1687/0</code></b>تأكيدًا آليًّا، بأمرٍ واحد، دون إنترنت</div>
  </footer>
</section></body></html>
