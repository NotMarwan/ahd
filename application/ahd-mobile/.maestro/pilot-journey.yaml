# Ahd Pilot — primary customer journey on a real Android build.
# Welcome disclosure -> create a real Ahd -> riba screen -> seal -> ledger -> detail -> proof.
appId: sa.ahd.mobile
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: "welcome-start"
    timeout: 30000
- tapOn:
    id: "welcome-start"
- extendedWaitUntil:
    visible:
      id: "tab-create"
    timeout: 15000
- tapOn:
    id: "tab-create"
- extendedWaitUntil:
    visible: "اكتب تفاصيل العهد"
    timeout: 15000
- extendedWaitUntil:
    visible:
      id: "create-lender-input"
    timeout: 15000
# Maestro inputText supports ASCII only on Android; display names are
# free-form, so the journey uses Latin names for the same real flow.
# hideKeyboard is unreliable on Android — every field is single-line, so
# pressing Enter (the ✓/done key) closes the keyboard deterministically.
- tapOn:
    id: "create-lender-input"
- inputText: "Reem"
- pressKey: Enter
- tapOn:
    id: "create-borrower-input"
- inputText: "Sara"
- pressKey: Enter
- tapOn:
    id: "create-amount-input"
- inputText: "1200"
- pressKey: Enter
- tapOn: "عهد مفتوح"
- scrollUntilVisible:
    element:
      id: "create-agreement-date-input"
    direction: DOWN
- tapOn:
    id: "create-agreement-date-input"
- inputText: "2026-07-16"
- pressKey: Enter
- scrollUntilVisible:
    element:
      id: "create-review-button"
    direction: DOWN
- tapOn:
    id: "create-review-button"
- extendedWaitUntil:
    visible: "الشروط خالية من الزيادة المشروطة"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "create-seal-button"
    direction: DOWN
- tapOn:
    id: "create-seal-button"
- extendedWaitUntil:
    visible: "تم حفظ الكلمة"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "create-open-daftari-button"
    direction: DOWN
- tapOn:
    id: "create-open-daftari-button"
- extendedWaitUntil:
    visible: "AHD-PILOT-0001"
    timeout: 15000
- tapOn:
    id: "daftari-open-record"
- extendedWaitUntil:
    visible: "الأصل والأطراف"
    timeout: 15000
- scrollUntilVisible:
    element:
      id: "record-open-proof"
    direction: DOWN
- tapOn:
    id: "record-open-proof"
# proof-verdict exists only on the proof screen after verifyProof() succeeds —
# the record-detail screen shows the same Arabic sentence, so assert the id, not the text.
- extendedWaitUntil:
    visible:
      id: "proof-verdict"
    timeout: 15000
