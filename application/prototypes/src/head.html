<title>عهد — السدو v3 (iOS)</title>
<style>
/* ============================================================================
   Ahd mobile prototype — «السدو» v3: iOS-grade pass (Apple HIG applied).
   Large-title nav · inset-grouped lists (hairline separators, 44pt rows) ·
   one terracotta accent · 8pt grid · thumb-zone actions · status bar + home
   indicator chrome. Signature kept: the thin Sadu band + the 9→2 weave.
   Spine: riba only negated · trust is a word · red reserved (stop/tamper) ·
   no ٪ glyphs · integer SAR · (محاكاة) on simulated integrations.
============================================================================ */
:root{
  --ground:#efe9dc;            /* systemGroupedBackground, shifted warm stone */
  --card:#ffffff;              /* secondarySystemGroupedBackground */
  --hair:rgba(60,50,30,.12);   /* hairline separator */
  --ink:#1c1812;               /* label */
  --ink2:#6d6353;              /* secondaryLabel */
  --ink3:#6f6555;              /* tertiaryLabel */
  --terra:#a1442e;             /* THE accent (all interactive) */
  --terra-soft:#f4e2da;
  --teal:#177f6d; --teal-soft:#e3f0eb;   /* semantic ok (fills/rings) */
  --teal-text:#116153;                    /* teal text-on-soft, WCAG AA */
  --gold:#a8863f;                         /* decorative (emblem stroke) */
  --gold-text:#7a5f27;                    /* verse / covenant text, WCAG AA */
  --stop:#7a2410; --stop-deep:#5e1a0a; --stop-soft:#f6e3da; --stop-line:#e0bcab;
  --seal-bg:#221d16; --seal-ink:#ece3d0; --seal-lbl:#b3a789; --seal-hash:#d8b978;
  --auth:#12312b;              /* official green-charcoal: emblem stroke + footer only */
  --sand-chip:#e8e0cf; --track:#e2d7c0; --ico-sand:#efe8d8; --gold-soft-bg:#f3ead2; --disabled:#cbbfa9; --plain-soft:#ece5d4;
  --amber:#8a3f14; --amber-soft:#f7e9d6;
  --mono:"Consolas","Courier New",monospace;
  --stage:#131109; --r:14px;
}
*{box-sizing:border-box}
body{margin:0; background:var(--stage); color:#e9e4da;
  font-family:"Segoe UI","Noto Naskh Arabic","Tahoma",system-ui,sans-serif; line-height:1.6}

/* ---- stage chrome ---- */
.stage{direction:rtl; max-width:1500px; margin:0 auto; padding:36px 22px 64px}
.stage-head{text-align:center; margin-bottom:4px}
.stage-head .k{font-size:11px; letter-spacing:3px; color:#c9a688; text-transform:uppercase}
.stage-head h1{margin:6px 0 4px; font-size:28px; font-weight:800; color:#f3e7cf}
.stage-head p{margin:0 auto; max-width:60ch; color:#a9a294; font-size:13.5px}
.phones{display:flex; gap:28px; justify-content:center; flex-wrap:wrap; margin-top:28px}
.phone-slot{display:flex; flex-direction:column; gap:11px; align-items:center}
.slot-lbl{font-size:13px; color:#d9cfba; font-weight:700; text-align:center}
.slot-lbl small{display:block; font-weight:400; color:#8f8878; font-size:11.5px}
.phone{width:375px; height:800px; border-radius:54px; background:#0d0b08; padding:10px;
  box-shadow:0 2px 8px rgba(0,0,0,.55), 0 30px 70px rgba(0,0,0,.55), inset 0 0 0 2px #2b241b}
.glass{position:relative; width:100%; height:100%; border-radius:44px; overflow:hidden; background:var(--ground); color:var(--ink)}
.island{position:absolute; top:10px; left:50%; transform:translateX(-50%); width:100px; height:26px; background:#0d0b08; border-radius:999px; z-index:40}
.status{position:absolute; top:12px; inset-inline:26px; display:flex; justify-content:space-between; z-index:35;
  font-size:13px; font-weight:700; font-variant-numeric:tabular-nums}
.status .r{letter-spacing:1px}
.homebar{position:absolute; bottom:7px; left:50%; transform:translateX(-50%); width:120px; height:5px; border-radius:999px; background:rgba(28,24,18,.28); z-index:40}
.viewport{direction:rtl; height:100%; overflow-y:auto; scrollbar-width:none; display:flex; flex-direction:column; padding:0 0 26px}
.viewport::-webkit-scrollbar{display:none}

/* ---- iOS large-title header ---- */
.nav-lg{padding:64px 20px 6px}
.eyebrow{font-size:12px; font-weight:600; color:var(--ink3)}
.lg-title{font-size:34px; font-weight:800; line-height:1.18; text-wrap:balance}
.sadu{height:8px; border-radius:2.5px; margin-top:10px; overflow:hidden;
  background:
    repeating-linear-gradient(135deg, var(--terra) 0 5px, transparent 5px 10px),
    repeating-linear-gradient(45deg, var(--ink) 0 5px, transparent 5px 10px),
    var(--track)}
.nav-lg .sub{font-size:13px; color:var(--ink2); margin-top:10px; line-height:1.8}
.callout{border-radius:11px; padding:10px 13px; font-size:12.5px; line-height:1.85; display:flex; gap:9px; align-items:flex-start; border:1px solid var(--hair)}
.callout .ci{flex:none; font-size:14px; margin-top:2px}
.callout.fixv{background:var(--teal-soft); color:var(--ink)} .callout.fixv b{color:var(--teal-text)}
.callout.insight{background:var(--card); color:var(--ink2)}
.callout.amber{background:var(--amber-soft); color:var(--amber)}

/* ---- state emblem: octagonal seal enclosing «عهد», hairline gold + auth stroke.
       Authority through craft, not claim — no external logos, no official words. ---- */
.emblem{width:40px; height:40px; margin-bottom:8px; display:flex; align-items:center; justify-content:center}
.emblem svg{width:100%; height:100%; display:block}
.emblem .oct{fill:none; stroke:var(--gold); stroke-width:1.1}
.emblem .oct-in{fill:none; stroke:var(--auth); stroke-width:.75; opacity:.6}
.emblem text{font-size:12.5px; font-weight:800; fill:var(--auth); text-anchor:middle; dominant-baseline:middle}

/* content column: 8pt grid */
.col{display:flex; flex-direction:column; gap:16px; padding:16px 16px 0; flex:1}
.sec-h{font-size:11.5px; font-weight:700; color:var(--ink2); opacity:.85; padding:0 12px; margin-bottom:-8px}

/* ---- inset-grouped list ---- */
.group{background:var(--card); border-radius:var(--r); overflow:hidden; box-shadow:0 1px 2px rgba(28,24,18,.05)}
.cell{display:grid; grid-template-columns:auto 1fr auto; gap:12px; align-items:center; min-height:52px; padding:10px 14px; position:relative}
.cell + .cell::before{content:""; position:absolute; top:0; inset-inline-start:66px; inset-inline-end:0; height:1px; background:var(--hair)}
.cell.noicon + .cell.noicon::before{inset-inline-start:14px}
.ico{width:32px; height:32px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:16px; background:var(--terra-soft)}
.ico.sand{background:var(--ico-sand)} .ico.teal{background:var(--teal-soft)}
.c-t{font-weight:600; font-size:15.5px}
.c-s{display:block; color:var(--ink2); font-size:12px; font-weight:400; margin-top:1px}
.chev{color:var(--ink3); font-size:17px; padding-bottom:2px}
.amt{text-align:left; font-variant-numeric:tabular-nums}
.amt b{font-size:16px; font-weight:700} .amt small{display:block; color:var(--ink3); font-size:11px; font-weight:400}
.amt.lak b{color:var(--teal)} .amt.alayk b{color:var(--gold-text)}

/* ---- buttons: ONE accent, 44pt+, thumb zone ---- */
.actions{margin-top:auto; padding:16px 16px 14px; display:flex; flex-direction:column; gap:10px}
.btn{appearance:none; border:0; width:100%; min-height:50px; border-radius:14px; font:inherit; font-size:16px; font-weight:700; cursor:pointer;
  display:flex; align-items:center; justify-content:center; gap:8px}
.btn.prominent{background:var(--terra); color:#fff; box-shadow:0 4px 14px rgba(161,68,46,.28)}
.btn.prominent[disabled]{background:var(--disabled); box-shadow:none; cursor:not-allowed}
.btn.tinted{background:var(--terra-soft); color:var(--terra)}
.btn.plain{background:transparent; color:var(--terra); min-height:44px; font-weight:600}
.row-2{display:flex; gap:10px} .row-2 .btn{flex:1}

/* banners / states — icon + text, never color alone */
.banner{border-radius:var(--r); padding:12px 14px; font-size:13px; line-height:1.8; display:flex; gap:9px; align-items:flex-start}
.banner .bi{flex:none; font-size:15px; margin-top:2px}
.banner.ok{background:var(--teal-soft); color:var(--teal-text); font-weight:600}
.banner.gold{background:var(--gold-soft-bg); color:var(--gold-text)}
.banner.plain{background:var(--plain-soft); color:var(--ink2)}
.verse{text-align:center; color:var(--gold-text); font-size:12.5px; line-height:2; padding:2px 20px}

/* ceremony (inline-title screens) */
.ceremony{display:flex; flex-direction:column; align-items:center; gap:12px; padding:70px 24px 8px; text-align:center}
.ring{width:112px; height:112px; border-radius:50%; padding:6px;
  background:repeating-conic-gradient(var(--ink) 0 10deg, var(--terra) 10deg 20deg, var(--track) 20deg 30deg)}
.badge{width:100%; height:100%; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:36px; color:#fff}
.badge.ok{background:var(--teal)} .badge.stop{background:var(--stop)}
.cer-h{font-size:24px; font-weight:800; line-height:1.35}
.cer-s{font-size:13px; color:var(--ink2); line-height:1.85; max-width:30ch}

/* micro-step seal rail (Nafath ceremony pattern) */
.steps{display:flex; align-items:center; justify-content:center; gap:6px; padding:2px 24px 0}
.step{display:flex; flex-direction:column; align-items:center; gap:3px; font-size:11.5px; font-weight:700; color:var(--ink3)}
.step i{font-style:normal; width:26px; height:26px; border-radius:50%; display:flex; align-items:center; justify-content:center;
  font-size:12.5px; background:var(--sand-chip); color:var(--ink2)}
.step.done i{background:var(--teal); color:#fff}
.step.done{color:var(--teal)}
.step.active i{background:var(--terra); color:#fff; box-shadow:0 0 0 4px var(--terra-soft)}
.step.active{color:var(--terra)}
.step.locked i{background:transparent; border:1.5px dashed var(--ink3)}
.step-line{width:34px; height:2px; border-radius:2px; background:var(--sand-chip); margin-bottom:16px}
.step-line.done{background:var(--teal)}

/* riba stop */
.quote{background:var(--card); border-radius:var(--r); padding:13px 15px; font-size:13px; line-height:2; box-shadow:0 1px 2px rgba(28,24,18,.05)}
.stopcard{background:var(--stop-soft); border:1px solid var(--stop-line); border-radius:var(--r); padding:13px 15px; color:var(--stop)}
.stopcard .h{font-weight:800; font-size:14px; color:var(--stop-deep); display:flex; gap:7px; align-items:center}
.stopcard .w{font-size:12.5px; margin-top:5px; line-height:1.85}
.footnote{text-align:center; color:var(--ink3); font-size:11.5px; line-height:1.9; padding:0 18px}

/* stat split */
.split{display:grid; grid-template-columns:1fr auto 1fr; align-items:center; gap:8px; background:var(--card); border-radius:var(--r); padding:16px 8px; text-align:center; box-shadow:0 1px 2px rgba(28,24,18,.05)}
.split .div{width:1px; height:44px; background:var(--hair)}
.st .k{font-size:11px; font-weight:600; color:var(--ink3)}
/* .ds serial stays 10.5px — decorative Latin monospace, not informational prose */
.st .v{font-size:25px; font-weight:800; margin-top:3px; font-variant-numeric:tabular-nums}
.st .v small{font-size:11.5px; color:var(--ink3); font-weight:400}

/* sealed doc */
.sealdoc{background:var(--seal-bg); color:var(--seal-ink); border-radius:var(--r); padding:16px}
.doc-head{display:flex; align-items:center; gap:11px; padding-bottom:11px; margin-bottom:11px;
  border-bottom:1.5px dashed rgba(216,185,120,.4)}
.doc-emblem{width:38px; height:38px; flex:none}
.doc-emblem polygon{stroke:var(--seal-hash)}
.doc-emblem text{fill:var(--seal-ink)}
.doc-id .dt{font-weight:800; font-size:14.5px}
.doc-id .ds{font-family:var(--mono); direction:ltr; text-align:left; font-size:10.5px; color:var(--seal-lbl); letter-spacing:1.5px}
.sealdoc .sl{color:var(--seal-lbl); font-size:11px; font-weight:700; margin-bottom:9px}
.sealdoc .body{font-size:13px; line-height:2}
.sealdoc .hash{font-family:var(--mono); direction:ltr; text-align:left; font-size:10.5px; color:var(--seal-hash);
  word-break:break-all; background:rgba(0,0,0,.3); border-radius:9px; padding:9px 11px; margin-top:10px}
.verify{border-radius:var(--r); padding:13px 15px; font-size:13px; font-weight:700; line-height:1.8; display:flex; gap:9px}
.verify .bi{flex:none; margin-top:2px}
.verify.ok{background:var(--teal-soft); color:var(--teal-text)}
.verify.bad{background:var(--stop-soft); color:var(--stop); border:1px solid var(--stop-line)}

/* impact */
.tiles{display:grid; grid-template-columns:1fr 1fr; gap:12px}
.tile{background:var(--card); border-radius:var(--r); padding:14px 12px; text-align:center; box-shadow:0 1px 2px rgba(28,24,18,.05)}
.tile b{display:block; font-size:22px; color:var(--teal); font-variant-numeric:tabular-nums}
.tile span{display:block; color:var(--ink2); font-size:11.5px; line-height:1.65; margin-top:3px}

/* ---- المقاصّة circle animation: 9 debts dissolve one by one, 2 transfers draw in.
       10s loop, pure CSS. Reduced motion → final state, no motion. ---- */
.muq .e{opacity:.55}
.muq .f{stroke-dasharray:200; stroke-dashoffset:200; opacity:0}
@media (prefers-reduced-motion: no-preference){
  .muq .e{animation:muq-fade 10s ease-in-out infinite}
  .muq .e1{animation-delay:0s}  .muq .e2{animation-delay:.35s} .muq .e3{animation-delay:.7s}
  .muq .e4{animation-delay:1.05s}.muq .e5{animation-delay:1.4s} .muq .e6{animation-delay:1.75s}
  .muq .e7{animation-delay:2.1s} .muq .e8{animation-delay:2.45s}.muq .e9{animation-delay:2.8s}
  .muq .f{animation:muq-draw 10s cubic-bezier(.16,1,.3,1) infinite}
  .muq .f2{animation-delay:.4s}
  @keyframes muq-fade{
    0%,12%{opacity:.55}
    22%,88%{opacity:.07}
    100%{opacity:.55}
  }
  @keyframes muq-draw{
    0%,38%{stroke-dashoffset:200; opacity:0}
    44%{opacity:1}
    58%,88%{stroke-dashoffset:0; opacity:1}
    96%,100%{stroke-dashoffset:200; opacity:0}
  }
}
@media (prefers-reduced-motion: reduce){
  .muq .e{opacity:.07}
  .muq .f{stroke-dashoffset:0; opacity:1}
}

/* ---- official document line: thin, closes every screen ---- */
.official-line{padding:8px 20px 4px; text-align:center; color:#4a5a52; font-size:10.5px;
  font-weight:600}

/* ---- alive motion: money counters count up (registered custom properties).
       Fallback: real number stays as text content — never shows 0 without support. ---- */
@property --n{ syntax:'<integer>'; inherits:false; initial-value:0; }
.count{ color:var(--count-color, inherit); }
@media (prefers-reduced-motion: no-preference){
  @supports at-rule(@property){
    .count{ counter-reset:n var(--n); animation:count 1.1s cubic-bezier(.16,1,.3,1) 1 both; animation-delay:.15s; color:transparent }
    .count::before{ content:counter(n); color:var(--count-color, var(--ink)) }
    @keyframes count{
      from{ --n:0 }
      to{ --n:var(--count-to) }
    }
  }
}

/* ---- دفتري net-balance gauge: conic ring sweeps once to ~270deg on load ---- */
@property --sweep{ syntax:'<angle>'; inherits:false; initial-value:0deg; }
.gauge{position:relative; width:64px; height:64px; border-radius:50%; flex:none;
  background:conic-gradient(var(--teal) var(--sweep), var(--track) 0)}
.gauge::after{content:""; position:absolute; inset:6px; border-radius:50%; background:var(--card)}
.gauge .lbl{position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
  font-size:10.5px; font-weight:700; color:var(--ink2); text-align:center; line-height:1.3; z-index:1}
@media (prefers-reduced-motion: no-preference){
  .gauge{ animation:gauge-sweep .9s cubic-bezier(.16,1,.3,1) 1 both; animation-delay:.1s }
  @keyframes gauge-sweep{ from{ --sweep:0deg } to{ --sweep:272deg } }
}
@media (prefers-reduced-motion: reduce){ .gauge{ --sweep:272deg } }

/* ---- chip pills: sealed/status/count tone (screens ⑧-⑩) ---- */
.chip{display:inline-flex; align-items:center; gap:4px; padding:4px 9px; border-radius:999px; font-size:11px; font-weight:700}
.chip.teal{background:var(--teal-soft); color:var(--teal-text)}
.chip.gold{background:var(--gold-soft-bg); color:var(--gold-text)}
.chip.amber{background:#f3e2c4; color:#8a5a1a}

/* ---- open-loan segmented progress bar: flex-grow fractions, no % text ---- */
.ol-bar{display:flex; height:8px; border-radius:4px; overflow:hidden; background:var(--track)}
.ol-seg.paid{background:var(--teal)} .ol-seg.forgiven{background:var(--gold)} .ol-seg.rem{background:var(--track)}
.ol-legend{display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; font-size:11px; color:var(--ink2)}
.ol-legend .paid{color:var(--teal-text); font-weight:700} .ol-legend .forgiven{color:var(--gold-text); font-weight:700}

/* ---- covenant trail spine: structural timeline guide (documented exception) ---- */
.cv-line{border-inline-start:2px dashed var(--hair); padding-inline-start:18px; display:flex; flex-direction:column; gap:14px}
.cv-step{position:relative; font-size:13px; line-height:1.75}
.cv-dot{position:absolute; inset-inline-start:-23px; top:3px; width:9px; height:9px; border-radius:50%; background:var(--gold)}
.cv-seal{font-family:var(--mono); direction:ltr; text-align:left; font-size:10.5px; color:var(--ink3); margin-top:3px}

/* ---- bounds: guard line + bank-section gold hairline; printed command well ---- */
.bd-guard{display:block; font-family:var(--mono); direction:ltr; text-align:left; font-size:11px; color:var(--ink3); margin-top:4px}
.bd-bank{border-top:2px solid var(--gold)}
.cmd{font-family:var(--mono); direction:ltr; text-align:left; font-size:11.5px; color:var(--ink2); background:var(--card); border-radius:var(--r); padding:10px 14px; box-shadow:0 1px 2px rgba(28,24,18,.05)}

/* ---- settings: digit/privacy segmented control ---- */
.set-seg{display:flex; gap:8px; margin-top:8px}
.set-seg button{flex:1; appearance:none; border:1px solid var(--hair); background:var(--card); border-radius:10px; padding:9px; font:inherit; font-size:12.5px; font-weight:700; color:var(--ink2); cursor:pointer}
.set-seg button.on{background:var(--teal-soft); color:var(--teal-text); border-color:transparent}

/* ---- wallet rows breathe: one-time slide-up + fade, staggered per row ---- */
@media (prefers-reduced-motion: no-preference){
  .breathe .cell{ animation:row-in .3s ease-out both }
  .breathe .cell:nth-child(1){ animation-delay:.05s }
  .breathe .cell:nth-child(2){ animation-delay:.13s }
  .breathe .cell:nth-child(3){ animation-delay:.21s }
  .breathe .cell:nth-child(4){ animation-delay:.29s }
  @keyframes row-in{ from{ opacity:0; transform:translateY(6px) } to{ opacity:1; transform:translateY(0) } }
}

.stage-foot{margin-top:34px; text-align:center; color:#8f8878; font-size:12px; line-height:2}
.stage-foot code{font-family:var(--mono); direction:ltr; unicode-bidi:embed; color:#c9a45c}
@media (max-width:820px){ .phone{width:340px; height:724px} }
</style>

<div class="stage">
  <div class="stage-head">
    <div class="k">AHD · SADU V3 · iOS HIG PASS · 7 SCREENS</div>
    <h1>عهد — السدو بلغة iOS</h1>
    <p>عناوين كبيرة، مجموعات مدمجة بفواصل شعريّة، لهجة واحدة، أفعالٌ في متناول الإبهام — وهويّة السدو باقية.</p>
  </div>

  <div class="phones">
